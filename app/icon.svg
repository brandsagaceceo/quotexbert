<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="QuoteXbert icon">
  <defs>
    <linearGradient id="hGrad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="rGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <radialGradient id="eyeG" cx="35%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>
    <radialGradient id="ringG" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#9f1239"/>
    </radialGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Head box -->
  <rect x="7" y="22" width="50" height="36" rx="7" fill="url(#hGrad)" filter="url(#s)"/>
  <!-- Head left highlight -->
  <rect x="7" y="22" width="25" height="18" rx="7" fill="white" opacity="0.04"/>
  <!-- Roof -->
  <path d="M3 27 L32 5 L61 27 L57 27 L32 9 L7 27 Z" fill="url(#rGrad)" filter="url(#s)"/>
  <!-- Roof right highlight -->
  <path d="M32 5 L61 27 L57 27 L32 9 Z" fill="white" opacity="0.18"/>
  <!-- Chimney -->
  <rect x="41" y="5" width="9" height="15" rx="3" fill="url(#rGrad)"/>
  <!-- Ear left -->
  <circle cx="7" cy="36" r="6" fill="url(#rGrad)"/>
  <!-- Ear right -->
  <circle cx="57" cy="36" r="6" fill="url(#rGrad)"/>
  <!-- Left eye -->
  <circle cx="22" cy="37" r="10" fill="url(#ringG)"/>
  <circle cx="22" cy="37" r="7.5" fill="#0f172a"/>
  <circle cx="22" cy="37" r="5.5" fill="url(#eyeG)"/>
  <circle cx="20" cy="34.5" r="2" fill="white" opacity="0.85"/>
  <!-- Right eye -->
  <circle cx="42" cy="37" r="10" fill="url(#ringG)"/>
  <circle cx="42" cy="37" r="7.5" fill="#0f172a"/>
  <circle cx="42" cy="37" r="5.5" fill="url(#eyeG)"/>
  <circle cx="40" cy="34.5" r="2" fill="white" opacity="0.85"/>
  <!-- Smile -->
  <path d="M23 51 Q32 58 41 51" stroke="#475569" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Cheek blush -->
  <ellipse cx="17" cy="50" rx="5" ry="3" fill="#f43f5e" opacity="0.2"/>
  <ellipse cx="47" cy="50" rx="5" ry="3" fill="#f43f5e" opacity="0.2"/>
</svg>
