<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 200" role="img" aria-label="QuoteXbert app icon">
  <defs>
    <!-- Brand gradients -->
    <linearGradient id="brandGradIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="roofGradIcon" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="darkBodyIcon" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="headGradIcon" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="eyeIrisIcon" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#67e8f9"/>
      <stop offset="80%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </radialGradient>
    <radialGradient id="eyeRingIcon" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#9f1239"/>
    </radialGradient>
    <filter id="dropShadowIcon">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Head (house-shaped) -->
  <path d="M40 100 L40 65 L90 35 L140 65 L140 100 Z" fill="url(#headGradIcon)" filter="url(#dropShadowIcon)"/>

  <!-- Roof -->
  <path d="M35 68 L90 32 L145 68 L140 68 L90 40 L40 68 Z" fill="url(#roofGradIcon)" filter="url(#dropShadowIcon)"/>

  <!-- Chimney -->
  <rect x="110" y="30" width="12" height="20" rx="3" fill="url(#roofGradIcon)"/>
  <rect x="108" y="28" width="16" height="5" rx="2" fill="#fb7185"/>

  <!-- Ears (simplified) -->
  <circle cx="42" cy="82" r="9" fill="url(#brandGradIcon)" filter="url(#dropShadowIcon)"/>
  <circle cx="138" cy="82" r="9" fill="url(#brandGradIcon)" filter="url(#dropShadowIcon)"/>

  <!-- Eyes (cyan for friendly AI personality) -->
  <!-- Left eye -->
  <circle cx="72" cy="75" r="13" fill="url(#eyeRingIcon)" filter="url(#dropShadowIcon)"/>
  <circle cx="72" cy="75" r="10" fill="#0f172a"/>
  <circle cx="72" cy="75" r="7" fill="url(#eyeIrisIcon)"/>
  <circle cx="72" cy="75" r="2.5" fill="#0c4a6e" opacity="0.7"/>
  <circle cx="69" cy="72" r="2.2" fill="white" opacity="0.85"/>

  <!-- Right eye -->
  <circle cx="108" cy="75" r="13" fill="url(#eyeRingIcon)" filter="url(#dropShadowIcon)"/>
  <circle cx="108" cy="75" r="10" fill="#0f172a"/>
  <circle cx="108" cy="75" r="7" fill="url(#eyeIrisIcon)"/>
  <circle cx="108" cy="75" r="2.5" fill="#0c4a6e" opacity="0.7"/>
  <circle cx="105" cy="72" r="2.2" fill="white" opacity="0.85"/>

  <!-- Smile -->
  <path d="M75 92 Q90 103 105 92" stroke="#475569" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="60" cy="90" rx="6" ry="3" fill="#f43f5e" opacity="0.15"/>
  <ellipse cx="120" cy="90" rx="6" ry="3" fill="#f43f5e" opacity="0.15"/>

  <!-- Torso (building) -->
  <rect x="55" y="105" width="70" height="55" rx="10" fill="url(#brandGradIcon)" filter="url(#dropShadowIcon)"/>

  <!-- Torso shine top -->
  <rect x="55" y="105" width="70" height="25" rx="10" fill="white" opacity="0.04"/>

  <!-- Chest panel detail -->
  <rect x="65" y="115" width="50" height="30" rx="6" fill="#9f1239" opacity="0.3"/>

  <!-- Left arm (simplified) -->
  <rect x="30" y="115" width="28" height="18" rx="9" fill="url(#brandGradIcon)" filter="url(#dropShadowIcon)"/>

  <!-- Right arm (simplified) -->
  <rect x="122" y="115" width="28" height="18" rx="9" fill="url(#brandGradIcon)" filter="url(#dropShadowIcon)"/>

  <!-- Legs (simplified) -->
  <rect x="68" y="158" width="15" height="32" rx="7" fill="url(#darkBodyIcon)" filter="url(#dropShadowIcon)"/>
  <rect x="97" y="158" width="15" height="32" rx="7" fill="url(#darkBodyIcon)" filter="url(#dropShadowIcon)"/>

  <!-- Feet -->
  <rect x="62" y="188" width="28" height="10" rx="5" fill="url(#brandGradIcon)" filter="url(#dropShadowIcon)"/>
  <rect x="90" y="188" width="28" height="10" rx="5" fill="url(#brandGradIcon)" filter="url(#dropShadowIcon)"/>
</svg>