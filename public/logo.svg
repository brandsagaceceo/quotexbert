  <rect x="72" y="205" width="22" height="28" rx="8" fill="#1a1a1a"/>
  <!-- Left foot -->
  <rect x="68" y="228" width="30" height="16" rx="8" fill="#b03a20"/>
  <!-- Right leg upper -->
  <rect x="106" y="205" width="22" height="28" rx="8" fill="#1a1a1a"/>
