<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" role="img" aria-label="QuoteXbert robot mascot logo">
  <!-- Body -->
  <rect x="62" y="118" width="76" height="58" rx="14" fill="#b03a20"/>
