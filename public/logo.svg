  <circle cx="54" cy="88" r="9" fill="#b03a20"/>
  <!-- Right ear circle -->
  <circle cx="146" cy="88" r="9" fill="#b03a20"/>
  <!-- Left eye outer ring -->
  <circle cx="84" cy="85" r="14" fill="#b03a20"/>
