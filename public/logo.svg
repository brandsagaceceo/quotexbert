  <!-- Right eye outer ring -->
  <circle cx="116" cy="85" r="14" fill="#b03a20"/>
  <!-- Right eye glow -->
  <circle cx="116" cy="85" r="10" fill="#ff8c00"/>
  <!-- Right eye inner glow -->
