  <rect x="70" y="174" width="60" height="6" rx="3" fill="#222"/>
  <rect x="70" y="181" width="60" height="6" rx="3" fill="#1a1a1a"/>
  <rect x="70" y="188" width="60" height="6" rx="3" fill="#222"/>
